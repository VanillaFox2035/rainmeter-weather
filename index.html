<!DOCTYPE html>
<html>
<head>
<title>Rainmeter weather</title>
</head>
<body>
<img id="weather-icon" src="https://raw.githubusercontent.com/VanillaFox2035/rainmeter-weather/main/Icons/Day/clear.png">
<div id="temperature">-</div>

<script>
async function loadWeather() {
    try {
        let location = "";
        const query = window.location.search;
        const params = new URLSearchParams(query);
        location = params.get("location");
        if (!location) {
            location = "北屯"; // Default location if none given
        }

        // Fetch data
        const response = await fetch("https://weatherdata.vanillafox.site:4200/CurrentWeather/?location=" + location);
        const data = await response.json();
        // Get weather info
        const weatherData = data.records.Station[0].WeatherElement;
        console.log("weather data", weatherData);
        const weather = weatherData.Weather;
        const temperature = Math.round(weatherData.AirTemperature).toString();
        const weatherIconElement = document.getElementById("weather-icon");
        const temperatureElement = document.getElementById("temperature");
        weatherIconElement.src = "Some picture";
        temperatureElement.innerText = temperature;
    }
    catch (error) {
        document.getElementById("temperature").innerText = "-";
        console.error(error);
    }
}

loadWeather();
</script>

</body>
</html>
